        <span class="brand-name">EduAdmin</span>
        <span class="brand-role">Super Admin</span>

    </div>

    <ul class="nav-menu">

      </li>

        <a href="{% url 'admin_panel:settings' %}" class="nav-link {% if request.resolver_match.url_name == 'settings' %}active{% endif %}"><span class="nav-icon"><i class="fa-solid fa-gear"></i></span><span class="nav-label">Settings</span></a>
